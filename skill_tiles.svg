<svg width="880" height="130" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style type="text/css">
      /* The animation now only handles the up/down float */
      @keyframes floatAnimation {
        0%, 100% {
          transform: translateY(0px);
        }
        50% {
          transform: translateY(-8px);
        }
      }

      .floating-tile {
        animation-name: floatAnimation;
        animation-duration: 3s;
        animation-iteration-count: infinite;
        animation-timing-function: ease-in-out;
      }
    </style>
  </defs>

  <g transform="translate(10, 20)">
    <g class="floating-tile" style="animation-delay: 0.0s;">
      <rect width="50" height="32" rx="2" ry="2" fill="#2ba92b" />
      <text x="25" y="16" text-anchor="middle" dominant-baseline="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">C#</text>
    </g>
  </g>

  <g transform="translate(65, 20)">
    <g class="floating-tile" style="animation-delay: 0.2s;">
      <rect width="60" height="32" rx="2" ry="2" fill="#0078d7" />
      <text x="30" y="16" text-anchor="middle" dominant-baseline="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">WPF</text>
    </g>
  </g>

  <g transform="translate(130, 20)">
    <g class="floating-tile" style="animation-delay: 0.4s;">
      <rect width="70" height="32" rx="2" ry="2" fill="#f25022" />
      <text x="35" y="16" text-anchor="middle" dominant-baseline="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">XAML</text>
    </g>
  </g>

  <g transform="translate(205, 20)">
    <g class="floating-tile" style="animation-delay: 0.6s;">
      <rect width="80" height="32" rx="2" ry="2" fill="#5c2d91" />
      <text x="40" y="16" text-anchor="middle" dominant-baseline="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">.NET</text>
    </g>
  </g>

  <g transform="translate(290, 20)">
    <g class="floating-tile" style="animation-delay: 0.8s;">
      <rect width="140" height="32" rx="2" ry="2" fill="#5c2d91" />
      <text x="70" y="16" text-anchor="middle" dominant-baseline="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">VISUAL STUDIO</text>
    </g>
  </g>

  <g transform="translate(435, 20)">
    <g class="floating-tile" style="animation-delay: 1.0s;">
      <rect width="210" height="32" rx="2" ry="2" fill="#cc292b" />
      <text x="105" y="16" text-anchor="middle" dominant-baseline="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">MICROSOFT SQL SERVER</text>
    </g>
  </g>

  <g transform="translate(650, 20)">
    <g class="floating-tile" style="animation-delay: 1.2s;">
      <rect width="60" height="32" rx="2" ry="2" fill="#f14e32" />
      <text x="30" y="16" text-anchor="middle" dominant-baseline="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">GIT</text>
    </g>
  </g>

  <g transform="translate(715, 20)">
    <g class="floating-tile" style="animation-delay: 1.4s;">
      <rect width="140" height="32" rx="2" ry="2" fill="#0078d7" />
      <text x="70" y="16" text-anchor="middle" dominant-baseline="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">AZURE DEVOPS</text>
    </g>
  </g>

  <g transform="translate(340, 65)">
    <g class="floating-tile" style="animation-delay: 0.5s;">
      <rect width="90" height="32" rx="2" ry="2" fill="#fbc02d" />
      <text x="45" y="16" text-anchor="middle" dominant-baseline="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#000000">LINUX</text>
    </g>
  </g>

  <g transform="translate(435, 65)">
    <g class="floating-tile" style="animation-delay: 0.7s;">
      <rect width="110" height="32" rx="2" ry="2" fill="#0078d7" />
      <text x="55" y="16" text-anchor="middle" dominant-baseline="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">WINDOWS</text>
    </g>
  </g>

</svg>
